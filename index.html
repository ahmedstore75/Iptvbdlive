<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SA IPTV BD LIVE</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>

  <header>
    <div class="top">
      <img src="logo.png" class="logo" alt="Logo">
      <div>
        <h1>SA IPTV BD LIVE</h1>
        <p>Premium Streaming</p>
      </div>

      <!-- ৩-দাগওয়ালা মেনু বাটন -->
      <div class="header-menu-wrapper">
        <button id="menuBtn" class="hamburger-btn" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div id="dropdownMenu" class="dropdown-menu">
          <a href="#" id="reloadBtn">🔄 Refresh Playlist</a>
          <a href="#" id="aboutBtn">ℹ️ About App</a>
        </div>
      </div>
    </div>
  </header>

  <div class="player">
    <video id="video" controls playsinline></video>
  </div>

  <!-- বামে ক্যাটাগরি, ডানে সার্চ (একই লাইনে এবং স্লিম) -->
  <div class="controls-bar">
    <div class="category-dropdown-wrapper">
      <select id="categorySelect">
        <option value="ALL">ALL CATEGORIES</option>
        <option value="NEWS">NEWS</option>
        <option value="SPORTS">SPORTS</option>
        <option value="MOVIES">MOVIES</option>
        <option value="KIDS">KIDS</option>
      </select>
    </div>

    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="Search..." />
    </div>
  </div>

  <div id="channelList" class="channels"></div>

  <script src="script.js"></script>
</body>

</html>
