<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- হেডার অংশ -->
  <header>
    <div class="top">
      <img src="https://via.placeholder.com/48" alt="Logo" class="logo">
      <h1>My TV Player</h1>
      <div class="header-menu-wrapper">
        <button class="hamburger-btn" id="menuToggle">
          <div class="bar-container">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </button>
      </div>
    </div>
  </header>

  <!-- প্রধান লেআউট -->
  <main class="main-layout">
    
    <!-- বাম পাশ: স্থির ভিডিও প্লেয়ার -->
    <section class="player-section">
      <div class="player">
        <video id="videoPlayer" controls poster="https://via.placeholder.com/800x450?text=Select+a+Channel"></video>
      </div>
    </section>

    <!-- ডান পাশ: ফিল্টার এবং চ্যানেল লিস্ট (শুধু এটি স্ক্রল হবে) -->
    <section class="content-section">
      <div class="controls-bar">
        <div class="category-dropdown-wrapper">
          <select id="categorySelect">
            <option value="all">সব ক্যাটাগরি</option>
          </select>
        </div>
        <div class="search-wrapper">
          <input type="text" id="searchInput" placeholder="চ্যানেল খুঁজুন...">
        </div>
      </div>

      <div class="channels" id="channelsContainer">
        <!-- চ্যানেল কার্ডগুলো এখানে ডায়নামিকালি লোড হবে -->
      </div>
    </section>

  </main>

</body>
</html>
