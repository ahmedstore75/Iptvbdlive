<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV Player</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

  <!-- Header Section -->
  <header>
    <div class="top">
      <img src="logo.png" alt="Logo" class="logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/44';">
      <h1>MIX IPTV</h1>
      <div class="header-menu-wrapper">
        <button class="hamburger-btn" id="menuBtn" aria-label="Open Menu">
          <div class="bar-container">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </button>
      </div>
    </div>
  </header>

  <!-- Side Menu Overlay & Sidebar -->
  <div class="menu-overlay" id="sideMenuOverlay"></div>
  <div class="side-menu" id="sideMenu">
    <div class="menu-header">
      <h2 id="menuHeading">নিয়ন্ত্রণ প্যানেল</h2>
      <button class="close-btn" id="closeMenuBtn">✕</button>
    </div>
    <div class="menu-items">
      <button class="menu-item" id="favBtn">
        <span class="icon-box icon-pink">★</span>
        <span id="lblFav">প্রিয় চ্যানেলসমূহ</span>
      </button>
      <button class="menu-item" id="recentBtn">
        <span class="icon-box icon-purple">🕒</span>
        <span id="lblRecent">সাম্প্রতিক প্লে</span>
      </button>
      <div class="menu-item size-item">
        <div class="item-left">
          <span class="icon-box icon-cyan">📐</span>
          <span id="lblVideoSize">ভিডিও সাইজ</span>
        </div>
        <select id="aspectRatioSelect">
          <option value="contain">Default</option>
          <option value="cover">Crop/Fill</option>
          <option value="fill">Stretch</option>
        </select>
      </div>
      <button class="menu-item" id="langBtn">
        <span class="icon-box icon-blue">🌐</span>
        <span id="lblLang">Language: English</span>
      </button>
      <button class="menu-item" id="themeBtn">
        <span class="icon-box icon-orange">🌙</span>
        <span id="lblTheme">থিম: Dark</span>
      </button>
      <button class="menu-item" id="reloadBtn">
        <span class="icon-box icon-green">🔄</span>
        <span id="lblReload">প্লেলিস্ট রিফ্রেশ করুন</span>
      </button>
      <a href="https://t.me/" target="_blank" class="menu-item">
        <span class="icon-box icon-telegram">✈️</span>
        <span id="lblTelegram">টেলিগ্রাম (সাপোর্ট)</span>
      </a>
      <a href="https://facebook.com/" target="_blank" class="menu-item">
        <span class="icon-box icon-facebook">f</span>
        <span id="lblFacebook">ফেসবুক (সাপোর্ট)</span>
      </a>
    </div>
  </div>

  <!-- Video Player Section -->
  <div class="player">
    <video id="video" controls playsinline poster="logo.png"></video>
  </div>

  <!-- Right/Bottom Content Section -->
  <div class="main-content-right">
    <div class="controls-bar">
      <div class="category-dropdown-wrapper">
        <select id="categorySelect">
          <option value="ALL">CATEGORY</option>
        </select>
      </div>
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search...">
      </div>
    </div>

    <div class="channels" id="channelList">
      <!-- Channels & Skeleton Loaders Render Here -->
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
