<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SA IPTV BD LIVE</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>

  <header>
    <div class="top">
      <img src="logo.png" class="logo" alt="Logo" onerror="this.src='https://via.placeholder.com/50';">
      <div>
        <h1>SA IPTV BD LIVE</h1>
      </div>

      <div class="header-menu-wrapper">
        <button id="menuBtn" class="hamburger-btn" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- নিয়ন্ত্রণ প্যানেল (Side Drawer Menu) -->
  <div id="sideMenuOverlay" class="menu-overlay"></div>
  <div id="sideMenu" class="side-menu">
    <div class="menu-header">
      <h2>নিয়ন্ত্রণ প্যানেল</h2>
      <button id="closeMenuBtn" class="close-btn">✖</button>
    </div>

    <div class="menu-items">
      <button class="menu-item" id="favBtn">
        <div class="icon-box icon-pink">★</div>
        <span class="label">প্রিয় চ্যানেলসমূহ</span>
      </button>

      <button class="menu-item" id="recentBtn">
        <div class="icon-box icon-purple">🕒</div>
        <span class="label">সাম্প্রতিক প্লে</span>
      </button>

      <div class="menu-item size-item">
        <div class="item-left">
          <div class="icon-box icon-cyan">⛶</div>
          <span class="label">ভিডিও সাইজ</span>
        </div>
        <select id="aspectRatioSelect">
          <option value="contain">Full Fit</option>
          <option value="cover">Crop Fill</option>
          <option value="fill">Stretch</option>
        </select>
      </div>

      <button class="menu-item" id="langBtn">
        <div class="icon-box icon-blue">文</div>
        <span class="label">Language: English</span>
      </button>

      <button class="menu-item" id="themeBtn">
        <div class="icon-box icon-orange">🌓</div>
        <span class="label">থিম পরিবর্তন (Light/Dark)</span>
      </button>

      <button class="menu-item" id="reloadBtn">
        <div class="icon-box icon-green">🔄</div>
        <span class="label">প্লেলিস্ট রিফ্রেশ করুন</span>
      </button>

      <a href="https://t.me/" target="_blank" class="menu-item link-item">
        <div class="icon-box icon-sky">✈</div>
        <span class="label">টেলিগ্রাম (সাপোর্ট)</span>
      </a>

      <a href="https://facebook.com/" target="_blank" class="menu-item link-item">
        <div class="icon-box icon-facebook">f</div>
        <span class="label">ফেসবুক (সাপোর্ট)</span>
      </a>
    </div>
  </div>

  <div class="player" id="playerContainer">
    <video id="video" controls playsinline></video>
  </div>

  <div class="controls-bar">
    <div class="category-dropdown-wrapper">
      <select id="categorySelect">
        <option value="ALL">ALL CATEGORIES</option>
      </select>
    </div>

    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="Search..." />
    </div>
  </div>

  <div id="channelList" class="channels"></div>

  <script src="script.js"></script>
</body>

</html>
